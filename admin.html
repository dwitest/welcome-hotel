<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin - Hotel</title>

<style>
body {
  margin: 0;
  background: #0f2027;
  color: white;
  font-family: Arial, sans-serif;
  text-align: center;
}

.container {
  margin-top: 80px;
}

h1 {
  margin-bottom: 30px;
}

input {
  padding: 12px;
  font-size: 18px;
  width: 250px;
  margin: 10px;
  text-align: center;
}

button {
  padding: 12px 20px;
  font-size: 18px;
  cursor: pointer;
  background: gold;
  border: none;
  border-radius: 5px;
}

.status {
  margin-top: 20px;
  color: lightgreen;
}
</style>
</head>

<body>

<div class="container">
  <h1>Reception Control</h1>

  <div>
    <input type="text" id="roomInput" placeholder="Room Number (ex: 101)">
  </div>

  <div>
    <input type="text" id="nameInput" placeholder="Guest Name">
  </div>

  <div>
    <button onclick="saveData()">SAVE</button>
  </div>

  <div class="status" id="status"></div>
</div>

<!-- 🔥 FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDv_mPyMokzVmbfbV4zkxgfcxb8S3ydy1w",
  authDomain: "welcome-hotel-72f97.firebaseapp.com",
  databaseURL: "https://welcome-hotel-72f97-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "welcome-hotel-72f97",
  storageBucket: "welcome-hotel-72f97.firebasestorage.app",
  messagingSenderId: "1007775173316",
  appId: "1:1007775173316:web:7b0aec3d5bb9a1ad8a9791"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.saveData = function() {
  const room = document.getElementById("roomInput").value.trim();
  const name = document.getElementById("nameInput").value.trim();

  if (!room || !name) {
    alert("Isi room & nama dulu");
    return;
  }

  set(ref(db, "rooms/" + room), {
    name: name
  });

  document.getElementById("status").innerText = "✅ Saved for Room " + room;

  // clear input
  document.getElementById("nameInput").value = "";
};
</script>

</body>
</html>
