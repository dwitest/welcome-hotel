<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Welcome Hotel</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.wrapper {
  position: relative;
  width: 100vw;
  max-width: 1920px;
  aspect-ratio: 16 / 9;

  background: url('design.jpg') no-repeat center;
  background-size: cover;
}

.guest {
  position: absolute;
  top: 54%;
  left: 31%;
  transform: translate(-50%, -50%);

  font-size: 3vw;
  color: #D4AF37;
  font-weight: bold;

  text-align: center;
  width: 40%;
  text-shadow: 0 3px 10px rgba(0,0,0,0.8);
}
</style>

</head>

<body>

<div class="wrapper">
  <div id="guestName" class="guest">Loading...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDv_mPyMokzVmbfbV4zkxgfcxb8S3ydy1w",
  authDomain: "welcome-hotel-72f97.firebaseapp.com",
  databaseURL: "https://welcome-hotel-72f97-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "welcome-hotel-72f97",
  storageBucket: "welcome-hotel-72f97.firebasestorage.app",
  messagingSenderId: "1007775173316",
  appId: "1:1007775173316:web:7b0aec3d5bb9a1ad8a9791"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(window.location.search);
const room = params.get("room") || "101";

const guestRef = ref(db, "rooms/" + room);

onValue(guestRef, (snapshot) => {
  const data = snapshot.val();
  const el = document.getElementById("guestName");

  if (data && data.name) {
    el.innerText = "Mr/Mrs " + data.name;
  } else {
    el.innerText = "Our Valued Guest";
  }
});
</script>

</body>
</html>
