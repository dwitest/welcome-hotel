<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welcome TV</title>

<style>
body {
  margin: 0;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

.wrapper {
  width: 100vw;
  max-width: 1920px;
  aspect-ratio: 16/9;
  background: url('design.jpg') no-repeat center;
  background-size: cover;
  position: relative;
}

.guest {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 4vw;
  color: gold;
  font-weight: bold;
  text-align: center;
}
</style>
</head>

<body>

<div class="wrapper">
  <div id="guestName" class="guest">Loading...</div>
</div>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDv_mPyMokzVmbfbV4zkxgfcxb8S3ydy1w",
  authDomain: "welcome-hotel-72f97.firebaseapp.com",
  databaseURL: "https://welcome-hotel-72f97-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "welcome-hotel-72f97",
  storageBucket: "welcome-hotel-72f97.firebasestorage.app",
  messagingSenderId: "1007775173316",
  appId: "1:1007775173316:web:7b0aec3d5bb9a1ad8a9791"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// default room 101
const room = "101";

const guestRef = ref(db, "rooms/" + room);

onValue(guestRef, (snapshot) => {
  const data = snapshot.val();

  const el = document.getElementById("guestName");

  if (data && data.name) {
    el.innerText = "Mr/Mrs " + data.name;
  } else {
    el.innerText = "Our Valued Guest";
  }
});
</script>

</body>
</html>
